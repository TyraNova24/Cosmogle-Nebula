<html lang="en">

<head>
  <title>Electron</title>
  <meta http-equiv="Content-Security-Policy" content="require-trusted-types-for 'script'; trusted-types electron-default-app" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-6PH54BfkNq/EMMhUY7nhHf3c+AxloOwfy7hWyT01CM8='; style-src 'self'; img-src 'self'; connect-src 'self'" />
  <link href="./styles.css" type="text/css" rel="stylesheet" />
  <link href="./octicon/build.css" type="text/css" rel="stylesheet" />
</head>

<body>
  <div id="stella-sidebar" style="
  position: fixed;
  left: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: rgba(0, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(0, 255, 255, 0.3);
  display: flex;
  flex-direction: column;
  padding: 20px;
  z-index: 9999;
">
  <div style="color: #00ffff; font-weight: bold; margin-bottom: 10px;">STELLA AI</div>
  <div id="stella-status" style="font-size: 0.8rem; color: #fff5e1; margin-bottom: 20px;">
    Ready to explore...
  </div>
  
  <div style="width: 100%; height: 150px; background: #000; border-radius: 10px; border: 1px solid #00ffff;"></div>
  
  <div style="margin-top: auto; color: rgba(255, 245, 225, 0.6); font-size: 0.7rem;">
    Connected to Novaville Galaxy
  </div>
</div>
  <style>
  body {
    background: linear-gradient(135deg, #001a1a 0%, #003333 100%); /* Deep Teal Space */
    color: #e0ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .nebula-logo {
    font-size: 4rem;
    font-weight: bold;
    text-shadow: 0 0 20px #00ffff, 0 0 30px #008080;
    margin-bottom: 20px;
  }

  .search-bar {
    width: 60%;
    padding: 15px 25px;
    border-radius: 50px;
    border: 2px solid #00ffff;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 1.2rem;
    outline: none;
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .search-bar:focus {
    box-shadow: 0 0 15px #00ffff;
  }

  .quick-links {
    margin-top: 30px;
    display: flex;
    gap: 20px;
  }

  .link-card {
    padding: 10px 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: #00ffff;
  }

  .link-card:hover {
    background: rgba(0, 255, 255, 0.2);
    transform: translateY(-5px);
  }
</style>

<body>
  <div class="nebula-logo">Cosmogle Nebula</div>
  <input type="text" class="search-bar" placeholder="Search the galaxy...">
  
  <div class="quick-links">
    <a href="https://omni.star" class="link-card">Omnistream+</a>
    <a href="https://starbook.star" class="link-card">Starbook</a>
    <a href="https://cmail.star" class="link-card">Cmail</a>
  </div>
  <script>
  // Stella AI - Activation of the 'Eye'
  const cameraBox = document.querySelector('[style*="height: 150px"]');
  
  // Create the video element
  const video = document.createElement('video');
  video.style.width = '100%';
  video.style.height = '100%';
  video.style.objectFit = 'cover';
  video.style.borderRadius = '10px';
  video.autoplay = true;

  // Ask for permission to see the world
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
      cameraBox.appendChild(video);
      document.getElementById('stella-status').innerText = "Stella is watching...";
    })
    .catch(err => {
      console.error("Stella's eyes are closed: ", err);
      document.getElementById('stella-status').innerText = "Camera access needed.";
    });
</script>
</body>
