<html lang="en">

<head>
  <title>Electron</title>
  <meta http-equiv="Content-Security-Policy" content="require-trusted-types-for 'script'; trusted-types electron-default-app" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-6PH54BfkNq/EMMhUY7nhHf3c+AxloOwfy7hWyT01CM8='; style-src 'self'; img-src 'self'; connect-src 'self'" />
  <link href="./styles.css" type="text/css" rel="stylesheet" />
  <link href="./octicon/build.css" type="text/css" rel="stylesheet" />
</head>

<body>
  <style>
  body {
    background: linear-gradient(135deg, #001a1a 0%, #003333 100%); /* Deep Teal Space */
    color: #e0ffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .nebula-logo {
    font-size: 4rem;
    font-weight: bold;
    text-shadow: 0 0 20px #00ffff, 0 0 30px #008080;
    margin-bottom: 20px;
  }

  .search-bar {
    width: 60%;
    padding: 15px 25px;
    border-radius: 50px;
    border: 2px solid #00ffff;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 1.2rem;
    outline: none;
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .search-bar:focus {
    box-shadow: 0 0 15px #00ffff;
  }

  .quick-links {
    margin-top: 30px;
    display: flex;
    gap: 20px;
  }

  .link-card {
    padding: 10px 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: #00ffff;
  }

  .link-card:hover {
    background: rgba(0, 255, 255, 0.2);
    transform: translateY(-5px);
  }
</style>

<body>
  <div class="nebula-logo">Cosmogle Nebula</div>
  <input type="text" class="search-bar" placeholder="Search the galaxy...">
  
  <div class="quick-links">
    <a href="https://omni.star" class="link-card">Omnistream+</a>
    <a href="https://starbook.star" class="link-card">Starbook</a>
    <a href="https://cmail.star" class="link-card">Cmail</a>
  </div>
</body>
